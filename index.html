<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Leitura de Hidrômetro</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Controle de Leitura de Hidrômetro</h1>

<form id="form">
  <input type="text" id="imovel" placeholder="Imóvel" required>
  <input type="number" id="leitura" placeholder="Leitura Atual" required>
  <button type="submit">Salvar</button>
</form>

<h2>Histórico</h2>
<table>
  <thead>
    <tr>
      <th>Imóvel</th>
      <th>Leitura</th>
      <th>Data</th>
    </tr>
  </thead>
  <tbody id="historico"></tbody>
</table>

<script src="js/app.js"></script>
</body>
</html>
